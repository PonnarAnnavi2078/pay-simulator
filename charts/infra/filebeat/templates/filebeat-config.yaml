{{- if .Values.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-filebeat-config
  labels:
    app: filebeat

data:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log

    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
          - logs_path:
              logs_path: "/var/log/containers/"

    output.elasticsearch:
      hosts: ["http://{{ .Release.Name }}-elasticsearch-service:{{ .Values.elasticsearch.port }}"]

    setup.kibana:
      host: "http://{{ .Release.Name }}-kibana-service:{{ .Values.kibana.port }}"

{{- end }}