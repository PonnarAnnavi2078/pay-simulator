{{- if .Values.enabled }}

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-filebeat
  labels:
    app: filebeat

spec:
  type: {{ .Values.service.type }}
  selector:
    app: filebeat
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

{{- end }}